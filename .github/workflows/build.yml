name: build via buildkit-operator

# Build this repo's image with buildkit-operator's ready-to-use Action — no build script here — and
# prove the supply chain end to end: the image is pushed to GHCR with SLSA provenance + an SBOM
# (both generated by the hot daemon), cosign-signed keyless via GitHub OIDC, then verified.
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push the image to GHCR
  id-token: write # keyless cosign signing via GitHub OIDC

env:
  IMAGE: ghcr.io/socialgouv/buildkit-operator-example

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # buildx forwards this registry auth to the remote daemon, which performs the --push.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # @main tracks latest; pin to @v1 (or a release tag) in production.
      - uses: socialgouv/buildkit-operator@main
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          # Only needed until a wildcard DNS *.<gateway-host> points at the gateway LB.
          gateway-ip: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_IP }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          push: true
          provenance: mode=max
          sbom: true
          sign: true

      # Prove it: the cosign signature verifies against THIS workflow's OIDC identity, and the image
      # carries the provenance + SBOM attestations the daemon generated.
      - uses: sigstore/cosign-installer@v3
      - name: verify signature + attestations
        run: |
          set -eux
          cosign verify "${IMAGE}:${{ github.sha }}" \
            --certificate-identity-regexp "(?i)^https://github.com/socialgouv/buildkit-operator-example/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com >/dev/null
          echo "✅ cosign signature verified"
          echo "::group::provenance"; docker buildx imagetools inspect "${IMAGE}:${{ github.sha }}" --format '{{ json .Provenance }}' | head -c 700; echo; echo "::endgroup::"
          echo "::group::sbom";       docker buildx imagetools inspect "${IMAGE}:${{ github.sha }}" --format '{{ json .SBOM }}'       | head -c 300; echo; echo "::endgroup::"
