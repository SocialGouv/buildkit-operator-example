# GitLab variant — SAME build.sh, different wrapper. buildcat is CI-agnostic: nothing here is
# GitHub/GitLab specific except getting the certs into the job. Run the GitLab runner in the same
# cluster (Kubernetes executor) so it can reach buildcat's in-cluster Services.
build:
  stage: build
  image: docker:27-cli
  variables:
    BUILDCAT_BUILDD_URL: http://buildcat-buildd.buildcat.svc:8080
    BUILDCAT_CERTS_DIR: certs
    REPO: $CI_PROJECT_PATH
  before_script:
    - apk add --no-cache curl jq
    - mkdir -p certs
    - printf '%s' "$BUILDCAT_CA"   | base64 -d > certs/ca.pem
    - printf '%s' "$BUILDCAT_CERT" | base64 -d > certs/cert.pem
    - printf '%s' "$BUILDCAT_KEY"  | base64 -d > certs/key.pem
  script:
    - sh build.sh -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
