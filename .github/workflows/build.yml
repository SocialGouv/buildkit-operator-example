name: build via buildkit-operator

# Builds this repo's image with buildkit-operator using its ready-to-use Action — no build script
# in this repo. The Action routes to the project's hot buildkitd and builds via buildx remote (mTLS),
# applying the project's S3 cold cache automatically.
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          # Only needed until a wildcard DNS *.<gateway-host> points at the gateway LB.
          gateway-ip: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_IP }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          tags: buildkit-operator-example:${{ github.sha }}
