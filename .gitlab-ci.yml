# The same buildkit-operator build on GitLab — no GitHub Action, just the CI-agnostic core script
# pulled from the operator repo. Set the BUILDKIT_OPERATOR_* CI variables (buildd URL + mTLS PEMs).
build:
  image: docker:27
  services: [docker:27-dind]
  variables:
    REPO: $CI_PROJECT_PATH
    TAGS: buildkit-operator-example:$CI_COMMIT_SHA
    GATEWAY_IP: $BUILDKIT_OPERATOR_GATEWAY_IP
  before_script:
    - apk add --no-cache curl jq bash
  script:
    - curl -fsSL https://raw.githubusercontent.com/socialgouv/buildkit-operator/v1/scripts/build.sh | bash
