name: build via buildcat (GitHub variant)

# Same build.sh as the GitLab variant — buildcat is CI-agnostic. The runner only has to reach
# the in-cluster buildcat Services (here: a self-hosted in-cluster runner).
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: arc-runners
    env:
      BUILDCAT_BUILDD_URL: http://buildcat-buildd.buildcat.svc:8080
      BUILDCAT_CERTS_DIR: certs
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p certs
          printf '%s' "${{ secrets.BUILDCAT_CA }}"   | base64 -d > certs/ca.pem
          printf '%s' "${{ secrets.BUILDCAT_CERT }}" | base64 -d > certs/cert.pem
          printf '%s' "${{ secrets.BUILDCAT_KEY }}"  | base64 -d > certs/key.pem
      - uses: docker/setup-buildx-action@v3
      - run: sh build.sh -t buildcat-example:${{ github.sha }} .
