name: build via buildcat (GitHub-hosted runner)

# Standard GitHub-hosted runner (ubuntu-latest) — nothing GitHub/arc specific. Because a hosted
# runner is OUTSIDE the cluster, buildcat must be reachable over the internet: buildd's /route and
# the daemon's :1234 (mTLS) exposed via a LoadBalancer/Ingress, with the public endpoint in the
# daemon cert SAN — exactly like the existing buildkit-service does (public LB + mTLS).
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILDCAT_BUILDD_URL: ${{ vars.BUILDCAT_BUILDD_URL }} # external buildd endpoint (LB/Ingress)
      BUILDCAT_CERTS_DIR: certs
      REPO: ${{ github.repository }}
      # Optional S3 cold cache — set these repo vars/secrets to enable (build.sh no-ops if BUCKET unset).
      # The endpoint is resolved DAEMON-side (in-cluster), so the runner never connects to S3 itself.
      BUILDCAT_S3_BUCKET: ${{ vars.BUILDCAT_S3_BUCKET }}
      BUILDCAT_S3_ENDPOINT: ${{ vars.BUILDCAT_S3_ENDPOINT }}
      BUILDCAT_S3_REGION: ${{ vars.BUILDCAT_S3_REGION }}
      BUILDCAT_S3_KEY: ${{ secrets.BUILDCAT_S3_KEY }}
      BUILDCAT_S3_SECRET: ${{ secrets.BUILDCAT_S3_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: client mTLS material (repo secrets, base64)
        run: |
          mkdir -p certs
          printf '%s' "${{ secrets.BUILDCAT_CA }}"   | base64 -d > certs/ca.pem
          printf '%s' "${{ secrets.BUILDCAT_CERT }}" | base64 -d > certs/cert.pem
          printf '%s' "${{ secrets.BUILDCAT_KEY }}"  | base64 -d > certs/key.pem
      - uses: docker/setup-buildx-action@v3
      - run: sh build.sh -t buildcat-example:${{ github.sha }} .
